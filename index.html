<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер Учебных Карточек</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --hover-color: #cccccc;
            --checkbox-checked: #000000;
            --font-main: 'Courier New', Courier, monospace;
        }

        body.dark-theme {
            --bg-color: #000000;
            --text-color: #ffffff;
            --border-color: #ffffff;
            --hover-color: #333333;
            --checkbox-checked: #ffffff;
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header-left, .header-right {
            width: 100px;
            display: flex;
            align-items: center;
        }

        .header-right {
            justify-content: flex-end;
        }

        .header-center {
            flex-grow: 1;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
        }

        button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            font-family: var(--font-main);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 14px;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        .hidden {
            display: none !important;
        }

        /* Body */
        #app-body {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Frames */
        .frame-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
        }

        .frame-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding: 0 5px;
        }

        .frame-name {
            font-size: 16px;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-family: var(--font-main);
            width: 200px;
            border-bottom: 1px solid transparent;
        }

        .frame-name:hover, .frame-name:focus {
            border-bottom: 1px solid var(--text-color);
        }

        .frame-content {
            border: 1px solid var(--border-color);
            padding: 10px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .frame-controls-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Cards */
        .card {
            border: 1px solid var(--border-color);
            min-height: 100px;
            position: relative;
            padding: 10px;
            padding-top: 25px; /* Space for controls */
            cursor: pointer;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        .card-controls {
            position: absolute;
            top: 5px;
            right: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-checkbox, .edit-btn {
            width: 16px;
            height: 16px;
            border: 1px solid var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .card-checkbox.checked {
            background-color: var(--checkbox-checked);
        }

        .edit-btn {
            font-size: 10px;
            line-height: 10px;
        }

        .card-text {
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
            height: 100%;
            overflow: hidden;
        }
        
        .card-text.scrollable {
            overflow-y: auto;
        }

        /* Card Types Specifics */
        .card.multi .top-area {
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .card.multi .bottom-area {
            font-size: 14px;
        }

        .card.multi .bottom-area div {
            cursor: pointer;
        }
        
        .card.multi .bottom-area div:hover {
            text-decoration: underline;
        }

        .card.multi .list-marker {
            margin-right: 5px;
        }

        /* Opposite Theme for Back Sides */
        .card.back-side {
            background-color: var(--bg-color); 
            /* Logic handled in JS to swap classes/colors effectively */
        }
        
        /* To implement opposite theme visually via CSS variables is tricky without nested contexts. 
           We will handle back-side colors via specific classes applied by JS */
        
        .card.opposite-theme {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        .card.opposite-theme .card-checkbox, 
        .card.opposite-theme .edit-btn {
            border-color: var(--bg-color);
        }
        .card.opposite-theme .card-checkbox.checked {
            background-color: var(--bg-color);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 20px;
            width: 400px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal input, .modal textarea {
            width: 100%;
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding: 5px;
            font-size: 14px;
            resize: vertical;
        }
        
        .modal textarea {
            min-height: 60px;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .pair-block {
            display: flex;
            flex-direction: column;
            gap: 5px;
            border: 1px solid var(--border-color);
            padding: 5px;
            margin-bottom: 5px;
        }

        .add-pair-btn {
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            padding: 0;
            margin-bottom: 10px;
        }

        /* Checkbox Custom */
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--text-color);
            background: transparent;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        input[type="checkbox"]:checked {
            background-color: var(--checkbox-checked);
        }

    </style>
</head>
<body class="light-theme">

    <header>
        <div class="header-left">
            <button id="btn-add-frame">+ фрейм</button>
        </div>
        <div class="header-center" id="theme-toggle">Sun</div>
        <div class="header-right">
            <button id="btn-delete-selected" class="hidden">удалить отмеченное</button>
        </div>
    </header>

    <div id="app-body">
        <!-- Frames will be added here -->
    </div>

    <!-- Modal: Card Format Selection -->
    <div id="modal-format" class="modal-overlay hidden">
        <div class="modal">
            <div>Выберите формат карточки:</div>
            <div class="modal-buttons" style="justify-content: center; gap: 20px;">
                <button id="fmt-one-answer">Один ответ</button>
                <button id="fmt-multi">Несколько вариантов с пояснениями</button>
                <button id="fmt-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Modal: Settings One Answer -->
    <div id="modal-settings-one" class="modal-overlay hidden">
        <div class="modal">
            <div>Редактирование карточки (Один ответ)</div>
            <label>Лицевая сторона:</label>
            <textarea id="set-one-front"></textarea>
            <label>Оборотная сторона:</label>
            <textarea id="set-one-back"></textarea>
            <div class="modal-buttons">
                <button id="set-one-save">Сохранить</button>
                <button id="set-one-cancel">Отменить</button>
            </div>
        </div>
    </div>

    <!-- Modal: Settings Multiple Variants -->
    <div id="modal-settings-multi" class="modal-overlay hidden">
        <div class="modal">
            <div>Редактирование карточки (Несколько вариантов)</div>
            <label>Верхняя область (Вопрос):</label>
            <textarea id="set-multi-top"></textarea>
            <div id="set-multi-pairs"></div>
            <button class="add-pair-btn" id="set-multi-add">+</button>
            <div class="modal-buttons">
                <button id="set-multi-save">Сохранить</button>
                <button id="set-multi-cancel">Отменить</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let isDarkTheme = false;
        let frames = [];
        let activeFrameId = null;
        let activeCardId = null;
        let activeCardType = null;

        // DOM Elements
        const body = document.body;
        const themeToggle = document.getElementById('theme-toggle');
        const btnAddFrame = document.getElementById('btn-add-frame');
        const btnDeleteSelected = document.getElementById('btn-delete-selected');
        const appBody = document.getElementById('app-body');
        
        // Modals
        const modalFormat = document.getElementById('modal-format');
        const modalSettingsOne = document.getElementById('modal-settings-one');
        const modalSettingsMulti = document.getElementById('modal-settings-multi');

        // Inputs Settings One
        const setOneFront = document.getElementById('set-one-front');
        const setOneBack = document.getElementById('set-one-back');

        // Inputs Settings Multi
        const setMultiTop = document.getElementById('set-multi-top');
        const setMultiPairs = document.getElementById('set-multi-pairs');

        // --- Theme Logic ---
        themeToggle.addEventListener('click', () => {
            isDarkTheme = !isDarkTheme;
            if (isDarkTheme) {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeToggle.textContent = 'Moon';
            } else {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeToggle.textContent = 'Sun';
            }
            updateCardThemes();
        });

        function updateCardThemes() {
            document.querySelectorAll('.card').forEach(card => {
                const isBack = card.classList.contains('show-back');
                if (isBack) {
                    card.classList.add('opposite-theme');
                } else {
                    card.classList.remove('opposite-theme');
                }
            });
        }

        // --- Frame Logic ---
        btnAddFrame.addEventListener('click', () => {
            const id = Date.now();
            const frame = {
                id: id,
                name: 'Фрейм',
                cards: [],
                checked: false
            };
            frames.push(frame);
            renderFrames();
            checkDeleteButton();
        });

        function renderFrames() {
            appBody.innerHTML = '';
            frames.forEach(frame => {
                const wrapper = document.createElement('div');
                wrapper.className = 'frame-wrapper';
                wrapper.dataset.id = frame.id;

                // Controls
                const controls = document.createElement('div');
                controls.className = 'frame-controls';

                const nameInput = document.createElement('input');
                nameInput.className = 'frame-name';
                nameInput.value = frame.name;
                nameInput.style.fontSize = '16px';
                nameInput.addEventListener('change', (e) => {
                    frame.name = e.target.value;
                });

                const rightControls = document.createElement('div');
                rightControls.className = 'frame-controls-right';

                const addCardBtn = document.createElement('button');
                addCardBtn.textContent = '+ карточка';
                addCardBtn.style.fontSize = '12px';
                addCardBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openFormatModal(frame.id);
                });

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                if (frame.checked) checkbox.checked = true;
                checkbox.addEventListener('change', (e) => {
                    frame.checked = e.target.checked;
                    checkDeleteButton();
                });

                rightControls.appendChild(addCardBtn);
                rightControls.appendChild(checkbox);
                controls.appendChild(nameInput);
                controls.appendChild(rightControls);

                // Content
                const content = document.createElement('div');
                content.className = 'frame-content';

                frame.cards.forEach(card => {
                    content.appendChild(createCardElement(card, frame.id));
                });

                wrapper.appendChild(controls);
                wrapper.appendChild(content);
                appBody.appendChild(wrapper);
            });
        }

        function createCardElement(card, frameId) {
            const el = document.createElement('div');
            el.className = `card ${card.type}`;
            el.dataset.id = card.id;
            
            // Theme handling
            if (card.showBack) {
                el.classList.add('show-back');
                el.classList.add('opposite-theme');
            } else {
                el.classList.remove('show-back');
                el.classList.remove('opposite-theme');
            }

            // Controls
            const controls = document.createElement('div');
            controls.className = 'card-controls';

            // Checkbox
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'card-checkbox';
            if (card.checked) cb.classList.add('checked');
            cb.addEventListener('change', (e) => {
                card.checked = e.target.checked;
                if(card.checked) cb.classList.add('checked');
                else cb.classList.remove('checked');
                checkDeleteButton();
                e.stopPropagation();
            });

            // Edit Btn
            const edit = document.createElement('div');
            edit.className = 'edit-btn';
            edit.textContent = '✎';
            edit.addEventListener('click', (e) => {
                e.stopPropagation();
                openSettingsModal(card);
            });

            controls.appendChild(cb);
            controls.appendChild(edit);
            el.appendChild(controls);

            // Content
            const textContainer = document.createElement('div');
            textContainer.className = 'card-text';
            
            if (card.type === 'one') {
                const text = card.showBack ? card.back : card.front;
                textContainer.textContent = text;
                if (card.showBack) {
                    // Hide controls on back
                    controls.style.display = 'none';
                }
                
                el.addEventListener('click', () => {
                    card.showBack = !card.showBack;
                    updateCardThemes();
                    renderFrames(); // Re-render to toggle controls visibility
                });

            } else if (card.type === 'multi') {
                if (card.showBack) {
                    // Back side
                    controls.style.display = 'none';
                    textContainer.textContent = card.backContent;
                    textContainer.style.fontSize = '14px';
                    
                    el.addEventListener('click', () => {
                        card.showBack = false;
                        card.selectedOptionIndex = -1;
                        updateCardThemes();
                        renderFrames();
                    });
                } else {
                    // Front side
                    const top = document.createElement('div');
                    top.className = 'top-area';
                    top.textContent = card.top;
                    
                    const bottom = document.createElement('div');
                    bottom.className = 'bottom-area';
                    
                    card.options.forEach((opt, idx) => {
                        const line = document.createElement('div');
                        line.innerHTML = `<span class="list-marker">&gt;</span> ${opt.text}`;
                        line.addEventListener('click', (e) => {
                            e.stopPropagation();
                            card.showBack = true;
                            card.backContent = opt.explanation;
                            updateCardThemes();
                            renderFrames();
                        });
                        bottom.appendChild(line);
                    });

                    textContainer.appendChild(top);
                    textContainer.appendChild(bottom);
                }
            }

            // Scroll check
            if (textContainer.scrollHeight > textContainer.clientHeight) {
                textContainer.classList.add('scrollable');
            }

            el.appendChild(textContainer);
            return el;
        }

        // --- Delete Logic ---
        function checkDeleteButton() {
            const hasChecked = frames.some(f => f.checked || f.cards.some(c => c.checked));
            if (hasChecked) {
                btnDeleteSelected.classList.remove('hidden');
            } else {
                btnDeleteSelected.classList.add('hidden');
            }
        }

        btnDeleteSelected.addEventListener('click', () => {
            // Remove checked frames
            frames = frames.filter(f => {
                if (f.checked) return false;
                // Remove checked cards within frame
                f.cards = f.cards.filter(c => !c.checked);
                return true;
            });
            renderFrames();
            checkDeleteButton();
        });

        // --- Modals Logic ---
        function openFormatModal(frameId) {
            activeFrameId = frameId;
            modalFormat.classList.remove('hidden');
        }

        function closeModals() {
            modalFormat.classList.add('hidden');
            modalSettingsOne.classList.add('hidden');
            modalSettingsMulti.classList.add('hidden');
            activeFrameId = null;
            activeCardId = null;
        }

        // Format Selection
        document.getElementById('fmt-one-answer').addEventListener('click', () => {
            addCard('one');
            closeModals();
        });
        document.getElementById('fmt-multi').addEventListener('click', () => {
            addCard('multi');
            closeModals();
        });
        document.getElementById('fmt-cancel').addEventListener('click', () => {
            closeModals();
        });

        function addCard(type) {
            const frame = frames.find(f => f.id === activeFrameId);
            if (!frame) return;
            const card = {
                id: Date.now(),
                type: type,
                checked: false,
                showBack: false,
                front: '',
                back: '',
                top: '',
                options: [],
                backContent: '',
                selectedOptionIndex: -1
            };
            if (type === 'multi') {
                card.options = [{text: '', explanation: ''}];
            }
            frame.cards.push(card);
            renderFrames();
        }

        // Settings One Answer
        document.getElementById('set-one-save').addEventListener('click', () => {
            const card = findCard(activeCardId);
            if (card) {
                card.front = setOneFront.value;
                card.back = setOneBack.value;
                card.showBack = false;
                updateCardThemes();
                renderFrames();
            }
            closeModals();
        });
        document.getElementById('set-one-cancel').addEventListener('click', closeModals);

        // Settings Multi
        document.getElementById('set-multi-add').addEventListener('click', () => {
            const pair = document.createElement('div');
            pair.className = 'pair-block';
            pair.innerHTML = `
                <input type="text" placeholder="Вариант" class="pair-opt">
                <input type="text" placeholder="Пояснение" class="pair-exp">
            `;
            setMultiPairs.appendChild(pair);
        });

        document.getElementById('set-multi-save').addEventListener('click', () => {
            const card = findCard(activeCardId);
            if (card) {
                card.top = setMultiTop.value;
                const pairs = setMultiPairs.querySelectorAll('.pair-block');
                const newOptions = [];
                pairs.forEach(p => {
                    const opt = p.querySelector('.pair-opt').value;
                    const exp = p.querySelector('.pair-exp').value;
                    if (opt.trim() !== '' || exp.trim() !== '') {
                        newOptions.push({ text: opt, explanation: exp });
                    }
                });
                card.options = newOptions;
                card.showBack = false;
                updateCardThemes();
                renderFrames();
            }
            closeModals();
        });
        document.getElementById('set-multi-cancel').addEventListener('click', closeModals);

        function openSettingsModal(card) {
            activeCardId = card.id;
            if (card.type === 'one') {
                setOneFront.value = card.front;
                setOneBack.value = card.back;
                modalSettingsOne.classList.remove('hidden');
            } else if (card.type === 'multi') {
                setMultiTop.value = card.top;
                setMultiPairs.innerHTML = '';
                card.options.forEach(opt => {
                    const pair = document.createElement('div');
                    pair.className = 'pair-block';
                    pair.innerHTML = `
                        <input type="text" placeholder="Вариант" class="pair-opt" value="${opt.text}">
                        <input type="text" placeholder="Пояснение" class="pair-exp" value="${opt.explanation}">
                    `;
                    setMultiPairs.appendChild(pair);
                });
                // Ensure at least one block if empty
                if (card.options.length === 0) {
                    document.getElementById('set-multi-add').click();
                }
                modalSettingsMulti.classList.remove('hidden');
            }
        }

        function findCard(id) {
            for (const f of frames) {
                const c = f.cards.find(card => card.id === id);
                if (c) return c;
            }
            return null;
        }

        // Initialize
        renderFrames();
    </script>
</body>
</html>
